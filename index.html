<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q by Q</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <h1>Q by Q</h1>
    <p>Past papers, one question at a time</p>
  </header>

  <!-- Paper Selection -->
  <section class="paper-selection">
    <select>
      <option>Select subject</option>
    </select>

    <select>
      <option>Select exam board</option>
    </select>

    <select>
      <option>Select year</option>
    </select>

    <select>
      <option>Select paper</option>
    </select>

    <button>Load paper</button>
  </section>

  <!-- Main Viewer -->
  <main class="viewer">

    <!-- Sidebar -->
<aside class="question-list" id="questionList">
</aside>



    <!-- Question Area -->
<section class="question-display">
  <div class="question-header">
    <h2 id="question-number">Question 1</h2>
    <span class="marks" id="question-marks">5 marks</span>
  </div>

  <div class="question-content" id="question-content">
    <p>Question content will appear here.</p>
  </div>

  <div class="controls">
    <button class="secondary" id="prevBtn">Previous</button>
    <button class="secondary" id="nextBtn">Next</button>
    <button class="primary">Mark scheme</button>
  </div>
</section>

  <!-- Footer -->
  <footer class="footer">
    <p>Built for A level past paper practice</p>
  </footer>
  <script src="js/app.js"></script>


</body>
</html>
