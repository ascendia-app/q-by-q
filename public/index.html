<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Practice | Q by Q</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.PNG">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <script>
    // Immediate execution to prevent flicker
    (function() {
        if (localStorage.getItem("sidebarCollapsed") === "true") {
            document.documentElement.classList.add('sidebar-is-collapsed');
        }
    })();
</script>
</head>
<body>

    <div class="app-container">
<aside class="sidebar" id="sidebar">
      <script>
        // Apply the class to the sidebar element specifically before it renders
        if (localStorage.getItem("sidebarCollapsed") === "true") {
            document.getElementById('sidebar').classList.add('collapsed');
        }
    </script>
    <div class="sidebar-header">
        <div class="sidebar-logo">Q<span>by</span>Q</div>
        <button id="toggleSidebar" class="toggle-btn">
            <i class="fas fa-bars"></i>
        </button>
    </div>
    
    <nav class="nav-links">
        <a href="dashboard.html" class="nav-item">
            <div class="icon-box"><i class="fas fa-home"></i></div>
            <span class="nav-text">Dashboard</span>
        </a>
        <a href="index.html" class="nav-item active">
            <div class="icon-box"><i class="fas fa-book"></i></div>
            <span class="nav-text">Practice</span>
        </a>
        <a href="saved.html" class="nav-item">
            <div class="icon-box"><i class="fas fa-bookmark"></i></div>
            <span class="nav-text">Saved</span>
        </a>
    </nav>
    
    <div class="sidebar-questions">
        <p class="nav-text" style="padding: 0 1.5rem; font-size: 0.8rem; color: #64748b; margin-top: 1rem;">QUESTIONS</p>
        <div class="question-list" id="questionList"></div>
    </div>
    
  <div class="sidebar-footer">
    <div id="userProfile" style="padding: 0 1.5rem; margin-bottom: 0.5rem; min-height: 1.2rem;">
        <span id="userEmail" class="nav-text" style="font-size: 0.75rem; color: #94a3b8; display: block;"></span>
    </div>
    <button id="authTopBtn" class="auth-btn">
        <div class="icon-box"><i class="fas fa-spinner fa-spin"></i></div>
        <span class="nav-text">Checking...</span>
    </button>
</div>
</aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="header-title">
                    <h2 style="margin:0; font-size: 1.2rem;">Practice Zone</h2>
                </div>
                
                <div class="header-timer">
                    <div id="timer">
                        <div class="time-box" id="hours">00</div>
                        <span class="colon">:</span>
                        <div class="time-box" id="minutes">00</div>
                        <span class="colon">:</span>
                        <div class="time-box" id="seconds">00</div>
                    </div>
                    <div class="timer-controls">
                        <button id="startTimer">Start</button>
                        <button id="pauseTimer">Pause</button>
                        <button id="resetTimer">Reset</button>
                    </div>
                </div>
            </header>

            <section class="paper-selection">
                <select id="subjectSelect"><option value="9709">Mathematics 9709</option></select>
                <select id="paperSelect"><option value="pure3">Pure 3</option></select>
                <select id="yearSelect">
                     <option value="2025">2025</option>
                    <option value="2024">2024</option>
                   
                    <option value="2023">2023</option>
                    <option value="2022">2022</option>
                </select>
                <select id="seasonSelect">
                    <option value="febmar">Feb/Mar</option>
                    <option value="mayjun">May/Jun</option>
                    <option value="octnov">Oct/Nov</option>
                </select>
                <select id="variantSelect">
                    <option value="1">v1</option>
                    <option value="2">v2</option>
                    <option value="3">v3</option>
                </select>
                <button id="loadPaperBtn" class="primary">Load Paper</button>
            </section>

            <div class="dashboard-content">
                <section class="question-display">
                    <div class="question-header">
                        <h2 id="question-number">Select a Paper to Begin</h2>
                    </div>

                    <div class="question-container">
                        <button id="prevBtn" class="image-arrow left">&#9664;</button>
                        <div id="question-content" class="question-content">
                            </div>
                        <button id="nextBtn" class="image-arrow right">&#9654;</button>
                    </div>

                    <div class="mark-btn-container"> 
                        <button class="primary" id="markSchemeBtn">
    <i class="fas fa-eye"></i> Show Mark Scheme
</button>
                        <button class="secondary-btn" id="saveQuestionBtn">
                            <i class="far fa-bookmark"></i> Save Question
                        </button>
                    </div>

                    <div id="markSchemeViewer" class="markscheme-viewer"></div>
                </section>
            </div>
        </main>
    </div>
  <div id="logoutModal" class="modal">
        <div class="modal-content logout-confirm-card">
            <div class="gate-icon-circle danger">
                <i class="fas fa-sign-out-alt"></i>
            </div>
            <h2 class="gate-title">Logging Out?</h2>
            <p class="gate-description">Are you sure you want to end your session?</p>
            <div class="gate-actions">
                <button id="confirmLogout" class="btn-gate danger-bg">Logout</button>
                <button id="cancelLogout" class="btn-gate secondary-bg">Stay</button>
            </div>
        </div>
    </div>
<div id="notFoundModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-icon">
            <i class="fas fa-exclamation-circle" style="color: #ef4444; font-size: 3rem;"></i>
        </div>
        <h2>Paper Not Found</h2>
        <p>Sorry, the specific paper or variant you selected does not exist in our database yet.</p>
        <div class="modal-buttons">
            <button id="closeNotFound" class="btn-confirm">Got it</button>
        </div>
    </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
